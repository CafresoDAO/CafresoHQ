<style id="cafreso-boot-style">
  /* Boot / provisioning overlay — painted before styles.css + React so the
     user sees a warm, on-brand splash instantly on every launch. Classical
     computer aesthetic: Press Start 2P wordmark on dark coffee, banana accents,
     a Graph-View-style node animation, and a CRT scanline wash. */
  #cafreso-boot{
    position:fixed; inset:0; z-index:99999; overflow:hidden;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    background:
      radial-gradient(circle at 50% 38%, #3a3320 0%, #262313 60%, #1c1810 100%);
    color:#F5EFE2; opacity:1; transition:opacity .6s ease;
    font-family:'JetBrains Mono', ui-monospace, monospace;
  }
  #cafreso-boot.is-hiding{ opacity:0; pointer-events:none; }
  #cafreso-boot canvas{ position:absolute; inset:0; width:100%; height:100%; }
  #cafreso-boot .boot-inner{
    position:relative; z-index:2; text-align:center;
    display:flex; flex-direction:column; align-items:center; gap:22px;
    padding:24px;
  }
  #cafreso-boot .boot-mark{
    font-family:'Press Start 2P', monospace;
    font-size:clamp(16px, 4.4vw, 30px); line-height:1.5; letter-spacing:.02em;
    color:#F5D25D; text-shadow:0 2px 0 #262313, 0 0 22px rgba(245,210,93,.35);
  }
  #cafreso-boot .boot-status{
    font-size:13px; letter-spacing:.06em; color:#D9C9A8;
    min-height:18px; display:flex; align-items:center; gap:10px;
  }
  #cafreso-boot .boot-dot{
    width:8px; height:8px; border-radius:50%; background:#F5D25D;
    box-shadow:0 0 10px #F5D25D; animation:cafresoPulse 1.1s ease-in-out infinite;
  }
  #cafreso-boot .boot-bar{
    width:min(280px, 64vw); height:3px; border-radius:3px;
    background:rgba(245,210,93,.16); overflow:hidden;
  }
  #cafreso-boot .boot-bar::after{
    content:''; display:block; height:100%; width:38%; border-radius:3px;
    background:linear-gradient(90deg, transparent, #F5D25D, transparent);
    animation:cafresoSlide 1.4s ease-in-out infinite;
  }
  /* scanline wash */
  #cafreso-boot::after{
    content:''; position:absolute; inset:0; z-index:3; pointer-events:none;
    background-image:repeating-linear-gradient(to bottom,
      rgba(0,0,0,.10) 0px, rgba(0,0,0,.10) 1px, transparent 1px, transparent 3px);
    mix-blend-mode:multiply; opacity:.5;
  }
  @keyframes cafresoPulse{ 0%,100%{ opacity:.35; transform:scale(.85);} 50%{ opacity:1; transform:scale(1);} }
  @keyframes cafresoSlide{ 0%{ transform:translateX(-120%);} 100%{ transform:translateX(360%);} }
  @media (prefers-reduced-motion: reduce){
    #cafreso-boot .boot-dot, #cafreso-boot .boot-bar::after{ animation:none; }
  }
</style>
<script>
  if ('serviceWorker' in navigator) {
    // Unregister stale SW on dev; re-enable for production
    navigator.serviceWorker.getRegistrations().then(regs => regs.forEach(r => r.unregister()));
  }
</script>

<body data-screen-label="01 Agent Office">
<div id="cafreso-boot" role="status" aria-live="polite">
  <canvas id="cafreso-boot-canvas"></canvas>
  <div class="boot-inner">
    <div class="boot-mark">CAFRESO&nbsp;HQ</div>
    <div class="boot-bar"></div>
    <div class="boot-status"><span class="boot-dot"></span><span id="cafreso-boot-text">Starting CafresoHQ…</span></div>
  </div>
</div>
<script>
/* Boot overlay controller — plain JS so it runs before React/Babel. Shows a
   Graph-View-style node animation while the app boots and the backend wakes,
   cycling "Starting…" → "Provisioning…". Fades out once the React app has
   mounted (cafresohq:ready) AND /health is reachable, with a hard safety cap so
   the user is never trapped behind the splash. */
(function () {
  var boot = document.getElementById('cafreso-boot');
  if (!boot) return;
  var txt = document.getElementById('cafreso-boot-text');
  var canvas = document.getElementById('cafreso-boot-canvas');
  var appReady = false, healthOk = false, done = false;
  var started = Date.now();

  // ── Graph animation: nodes drift + edges fade in (echo of GraphView) ──
  var ctx = canvas.getContext('2d'), nodes = [], edges = [], raf = 0;
  function size() {
    var d = window.devicePixelRatio || 1;
    canvas.width = innerWidth * d; canvas.height = innerHeight * d;
    ctx.setTransform(d, 0, 0, d, 0, 0);
  }
  function seed() {
    nodes = []; edges = [];
    var n = Math.max(14, Math.min(34, Math.round(innerWidth / 46)));
    for (var i = 0; i < n; i++) {
      nodes.push({ x: Math.random() * innerWidth, y: Math.random() * innerHeight,
        vx: (Math.random() - .5) * .25, vy: (Math.random() - .5) * .25,
        r: 1.6 + Math.random() * 2.4, born: Math.random() * 1200 });
    }
    for (var j = 0; j < n; j++) for (var k = j + 1; k < n; k++)
      if (Math.random() < .10) edges.push([j, k]);
  }
  function frame() {
    var t = Date.now() - started, w = innerWidth, h = innerHeight;
    ctx.clearRect(0, 0, w, h);
    for (var i = 0; i < nodes.length; i++) {
      var p = nodes[i];
      p.x += p.vx; p.y += p.vy;
      if (p.x < 0 || p.x > w) p.vx *= -1;
      if (p.y < 0 || p.y > h) p.vy *= -1;
    }
    ctx.lineWidth = 1;
    for (var e = 0; e < edges.length; e++) {
      var a = nodes[edges[e][0]], b = nodes[edges[e][1]];
      var ap = Math.min(1, Math.max(0, (t - Math.max(a.born, b.born)) / 900));
      if (ap <= 0) continue;
      ctx.strokeStyle = 'rgba(245,210,93,' + (0.10 * ap) + ')';
      ctx.beginPath(); ctx.moveTo(a.x, a.y); ctx.lineTo(b.x, b.y); ctx.stroke();
    }
    for (var m = 0; m < nodes.length; m++) {
      var q = nodes[m], qp = Math.min(1, Math.max(0, (t - q.born) / 700));
      if (qp <= 0) continue;
      ctx.fillStyle = 'rgba(245,210,93,' + (0.55 * qp) + ')';
      ctx.beginPath(); ctx.arc(q.x, q.y, q.r, 0, 6.2832); ctx.fill();
    }
    raf = requestAnimationFrame(frame);
  }
  try { size(); seed(); frame(); window.addEventListener('resize', function () { size(); seed(); }); } catch (_) {}

  // ── Status copy: Starting… → Provisioning… ──
  setTimeout(function () { if (!done && txt) txt.textContent = 'Provisioning CafresoHQ…'; }, 1200);

  // ── Health polling ──
  function apiBase() {
    if (window._API_BASE != null) return window._API_BASE;
    try {
      var qp = new URLSearchParams(location.search).get('api');
      if (qp) return String(qp).replace(/\/$/, '');
    } catch (_) {}
    return location.pathname.replace(/\/[^/]*$/, '');
  }
  function poll() {
    if (done) return;
    fetch(apiBase() + '/health', { cache: 'no-store' })
      .then(function (r) { if (r.ok) { healthOk = true; maybeHide(); } })
      .catch(function () {})
      .finally(function () { if (!done) setTimeout(poll, healthOk ? 4000 : 1500); });
  }
  poll();

  function hide() {
    if (done) return; done = true;
    boot.classList.add('is-hiding');
    setTimeout(function () { if (raf) cancelAnimationFrame(raf); boot.remove(); }, 700);
  }
  function maybeHide() {
    // Normal path: app mounted AND backend reachable, after a brief minimum so
    // the splash never just flickers.
    if (appReady && healthOk && (Date.now() - started) > 900) hide();
  }
  window.addEventListener('cafresohq:ready', function () { appReady = true; maybeHide(); });
  // Safety nets: never trap the user. If the app mounted but the backend is
  // still cold after a while, proceed anyway (the app degrades gracefully).
  setTimeout(function () { if (appReady) hide(); }, 12000);
  setTimeout(hide, 30000);
  boot.addEventListener('click', function () { if (appReady) hide(); });
})();
</script>
