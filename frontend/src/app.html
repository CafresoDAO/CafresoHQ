<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" type="image/png" href="%sveltekit.assets%/cf-black.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="%sveltekit.assets%/cf-black.png" />
    <!-- viewport-fit=cover lets the layout extend into notched-device safe
         areas; fixed components pad with env(safe-area-inset-*). -->
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#262313" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Cafreso" />
    <script>
      (() => {
        const key = 'cafreso-theme';
        const stored = localStorage.getItem(key);
        const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        const theme = stored === 'dark' || stored === 'light' ? stored : (prefersDark ? 'dark' : 'light');
        document.documentElement.classList.toggle('dark', theme === 'dark');
        document.documentElement.dataset.theme = theme;
        document.querySelector('meta[name="theme-color"]')?.setAttribute('content', theme === 'dark' ? '#1b100b' : '#262313');
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet"
          href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,600&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" />
    <title>Cafreso - AI Agent Command Center</title>
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover">
    <!-- Boot splash: pure inline HTML/CSS so it paints before ANY JS loads —
         kills the multi-second blank-white page on cold canister loads.
         Removed by the root layout the moment Svelte hydrates. -->
    <div id="boot-splash" aria-hidden="true">
      <div class="boot-mark">Cafreso</div>
      <div class="boot-bar"><span></span></div>
    </div>
    <style>
      #boot-splash {
        position: fixed; inset: 0; z-index: 9999;
        display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 18px;
        background: #FBF8F1;
      }
      .dark #boot-splash { background: #1b100b; }
      #boot-splash .boot-mark {
        font-family: 'Playfair Display', Georgia, serif;
        font-weight: 700; font-size: clamp(34px, 7vw, 52px); letter-spacing: -0.02em;
        color: #262313;
      }
      .dark #boot-splash .boot-mark { color: #F3EBDD; }
      #boot-splash .boot-bar {
        width: 120px; height: 3px; border-radius: 999px; overflow: hidden;
        background: rgba(120, 90, 40, 0.18);
      }
      #boot-splash .boot-bar span {
        display: block; height: 100%; width: 40%;
        border-radius: 999px; background: #C8921A;
        animation: boot-slide 1.1s ease-in-out infinite;
      }
      @keyframes boot-slide {
        0% { transform: translateX(-110%); }
        100% { transform: translateX(320%); }
      }
    </style>
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
