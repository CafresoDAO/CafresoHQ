<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#1a1028"/>
      <stop offset="25%"  stop-color="#2d1845"/>
      <stop offset="50%"  stop-color="#6b3a6d"/>
      <stop offset="70%"  stop-color="#c06848"/>
      <stop offset="85%"  stop-color="#e8a040"/>
      <stop offset="100%" stop-color="#f4c868"/>
    </linearGradient>
    <linearGradient id="mtn1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#2a1f3d"/>
      <stop offset="100%" stop-color="#1a1428"/>
    </linearGradient>
    <linearGradient id="mtn2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#221a30"/>
      <stop offset="100%" stop-color="#141020"/>
    </linearGradient>
    <linearGradient id="fg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#1a1428"/>
      <stop offset="100%" stop-color="#0e0a16"/>
    </linearGradient>
  </defs>

  <!-- Sky gradient -->
  <rect width="1440" height="900" fill="url(#sky)"/>

  <!-- Stars -->
  <circle cx="120" cy="80"  r="1.2" fill="#fff" opacity="0.6"/>
  <circle cx="340" cy="45"  r="1"   fill="#fff" opacity="0.5"/>
  <circle cx="580" cy="110" r="0.8" fill="#fff" opacity="0.4"/>
  <circle cx="780" cy="60"  r="1.3" fill="#fff" opacity="0.55"/>
  <circle cx="920" cy="90"  r="0.9" fill="#fff" opacity="0.45"/>
  <circle cx="1100" cy="35" r="1.1" fill="#fff" opacity="0.5"/>
  <circle cx="1280" cy="75" r="1"   fill="#fff" opacity="0.4"/>
  <circle cx="200" cy="150" r="0.7" fill="#fff" opacity="0.35"/>
  <circle cx="650" cy="30"  r="1.4" fill="#fff" opacity="0.6"/>
  <circle cx="1020" cy="130" r="0.8" fill="#fff" opacity="0.3"/>

  <!-- Far mountain range (Wasatch-like silhouette) -->
  <path d="M0,520 L60,480 L140,440 L200,460 L280,390 L340,370
           L400,350 L460,380 L500,320 L560,340 L620,280 L680,310
           L720,270 L780,300 L840,260 L880,290 L920,250 L960,280
           L1020,310 L1060,330 L1100,290 L1140,320 L1200,350
           L1260,380 L1320,400 L1380,420 L1440,440 L1440,900 L0,900 Z"
        fill="url(#mtn1)" opacity="0.85"/>

  <!-- Snow caps on distant peaks -->
  <path d="M610,285 L620,280 L632,287" fill="#fff" opacity="0.25"/>
  <path d="M710,275 L720,270 L732,278" fill="#fff" opacity="0.2"/>
  <path d="M830,265 L840,260 L852,268" fill="#fff" opacity="0.22"/>
  <path d="M910,255 L920,250 L932,258" fill="#fff" opacity="0.2"/>

  <!-- Near mountain range (foothills) -->
  <path d="M0,600 L80,570 L160,540 L240,560 L320,520 L400,550
           L480,510 L560,540 L640,500 L720,530 L800,490 L860,520
           L920,480 L980,510 L1060,540 L1140,520 L1220,550
           L1300,530 L1380,560 L1440,540 L1440,900 L0,900 Z"
        fill="url(#mtn2)" opacity="0.9"/>

  <!-- Foreground hills -->
  <path d="M0,720 L120,690 L240,700 L360,680 L480,710 L600,690
           L720,720 L840,700 L960,730 L1080,710 L1200,740
           L1320,720 L1440,740 L1440,900 L0,900 Z"
        fill="url(#fg)"/>

  <!-- City glow on horizon -->
  <ellipse cx="720" cy="620" rx="500" ry="60" fill="#f4c868" opacity="0.06"/>
</svg>
