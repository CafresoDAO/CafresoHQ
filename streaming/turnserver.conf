# ── coturn configuration for CafresoAI WebRTC relay ──────────────────────────
# HMAC-SHA1 time-limited credentials — fleet-api.py generates per-session
# username:credential pairs using the static-auth-secret below.
#
# Credential format:  username = "expiry_timestamp:session_id"
#                     credential = HMAC-SHA1(secret, username)

# Listening ports
listening-port=3478
tls-listening-port=5349
alt-listening-port=3479
alt-tls-listening-port=5350

# Relay port range (constrain for firewall rules)
min-port=49152
max-port=65535

# Authentication
use-auth-secret
static-auth-secret=8086143942b734c87bbe2247c509c331ad15202df8d4254af5a8c0171d1ac861

# Realm (used in credentials)
realm=cafreso.com

# TLS certificates (from Caddy / Let's Encrypt)
# Uncomment these when Caddy has issued certs on the production host:
# cert=/etc/turn-certs/acme-v02.api.letsencrypt.org-directory/hq.cafreso.com/hq.cafreso.com.crt
# pkey=/etc/turn-certs/acme-v02.api.letsencrypt.org-directory/hq.cafreso.com/hq.cafreso.com.key

# External IP — required for relay when behind NAT / Docker host networking.
# Set to the server's public IP so clients know where to send media.
# external-ip=YOUR_PUBLIC_IP

# Total bandwidth limit for all TURN relay sessions (bytes/sec, 0 = unlimited)
total-quota=0
bps-capacity=0

# Max per-session bandwidth (bytes/sec)
max-bps=0

# Stale nonce lifetime (seconds)
stale-nonce=600

# Allocation lifetime (WebRTC default is 600s)
channel-lifetime=600
permission-lifetime=300

# Logging
log-file=stdout
verbose

# Security
no-multicast-peers
no-cli

# Fingerprinting (required for WebRTC)
fingerprint

# Restrict relay to the local network range (don't relay to the internet)
# Adjust these to match your Hyper-V VM subnet
allowed-peer-ip=10.0.0.0-10.255.255.255
allowed-peer-ip=172.16.0.0-172.31.255.255
allowed-peer-ip=192.168.0.0-192.168.255.255

# Deny relay to localhost / link-local
denied-peer-ip=0.0.0.0-0.255.255.255
denied-peer-ip=127.0.0.0-127.255.255.255
denied-peer-ip=169.254.0.0-169.254.255.255
